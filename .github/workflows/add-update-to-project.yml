name: Add Update To Project

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    if: contains(github.event.issue.labels.*.name, 'game-update')

    runs-on: ubuntu-latest

    steps:
      - name: Add issue to project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/EXEEGames/projects/2
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}