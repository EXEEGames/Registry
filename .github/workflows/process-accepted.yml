name: Process Accepted Issues

on:
  issues:
    types: [labeled]

jobs:
  process:
    if: github.event.label.name == 'accepted'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Save issue body
        run: |
          echo '${{ github.event.issue.body }}' > issue.txt

      - name: Extract PCK URL
        run: |
          grep -E "PCK Download URL:|New PCK Download URL:" issue.txt | sed -E 's/PCK Download URL: |New PCK Download URL: //' > url.txt

      - name: Download PCK
        run: |
          wget -O game.pck $(cat url.txt)

      - name: Generate SHA256
        run: |
          sha256sum game.pck | awk '{print $1}' > sha256.txt

      - name: Install dependencies
        run: npm install

      - name: Update registry
        run: node scripts/parseIssue.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add games.json

          git commit -m "Update EXEE registry" || echo "No changes"

          git push

      - name: Comment success
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body:
                "✅ Game processed successfully.\n\n" +
                "SHA256 generated automatically."
            });